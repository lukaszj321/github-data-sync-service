name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: github_data_sync_test
          POSTGRES_USER: github_data_sync
          POSTGRES_PASSWORD: github_data_sync
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U github_data_sync -d github_data_sync_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://github_data_sync:github_data_sync@localhost:5432/github_data_sync_test
      TEST_DATABASE_URL: postgresql+psycopg://github_data_sync:github_data_sync@localhost:5432/github_data_sync_test
      RUN_LIVE_TESTS: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy src
      - run: python -m pytest -m "not integration and not live" -W error --cov=github_data_sync_service --cov-branch --cov-report=term-missing --cov-fail-under=85
      - run: alembic upgrade head
      - run: python -m pytest -m integration -W error
      - run: python -m build
      - run: |
          python -m venv /tmp/wheel-test
          /tmp/wheel-test/bin/pip install dist/*.whl
          /tmp/wheel-test/bin/github-data-sync-worker --version
      - run: docker build -t github-data-sync-service:ci .
      - run: docker run --rm --entrypoint id github-data-sync-service:ci -u
