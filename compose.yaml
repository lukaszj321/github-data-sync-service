services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: github_data_sync
      POSTGRES_USER: github_data_sync
      POSTGRES_PASSWORD: github_data_sync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U github_data_sync -d github_data_sync"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    environment:
      APP_ENV: local
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://github_data_sync:github_data_sync@db:5432/github_data_sync
      GITHUB_TOKEN: ""
      GITHUB_API_BASE_URL: https://api.github.com
      GITHUB_API_VERSION: "2022-11-28"
      GITHUB_CONNECT_TIMEOUT_SECONDS: "5"
      GITHUB_READ_TIMEOUT_SECONDS: "15"
      GITHUB_MAX_ATTEMPTS: "3"
      GITHUB_ISSUES_PER_PAGE: "100"
      GITHUB_MAX_PAGES_PER_SYNC: "1000"
      WORKER_POLL_INTERVAL_SECONDS: "5"
      WORKER_RATE_LIMIT_FALLBACK_SECONDS: "60"
      WORKER_STALE_JOB_TIMEOUT_SECONDS: "300"
      WORKER_ID: worker-compose
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    environment:
      APP_ENV: local
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://github_data_sync:github_data_sync@db:5432/github_data_sync
      GITHUB_TOKEN: ""
      GITHUB_API_BASE_URL: https://api.github.com
      GITHUB_API_VERSION: "2022-11-28"
      GITHUB_CONNECT_TIMEOUT_SECONDS: "5"
      GITHUB_READ_TIMEOUT_SECONDS: "15"
      GITHUB_MAX_ATTEMPTS: "3"
      GITHUB_ISSUES_PER_PAGE: "100"
      GITHUB_MAX_PAGES_PER_SYNC: "1000"
      WORKER_POLL_INTERVAL_SECONDS: "5"
      WORKER_RATE_LIMIT_FALLBACK_SECONDS: "60"
      WORKER_STALE_JOB_TIMEOUT_SECONDS: "300"
      WORKER_ID: worker-compose
    command: uvicorn github_data_sync_service.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    environment:
      APP_ENV: local
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://github_data_sync:github_data_sync@db:5432/github_data_sync
      GITHUB_TOKEN: ""
      GITHUB_API_BASE_URL: https://api.github.com
      GITHUB_API_VERSION: "2022-11-28"
      GITHUB_CONNECT_TIMEOUT_SECONDS: "5"
      GITHUB_READ_TIMEOUT_SECONDS: "15"
      GITHUB_MAX_ATTEMPTS: "3"
      GITHUB_ISSUES_PER_PAGE: "100"
      GITHUB_MAX_PAGES_PER_SYNC: "1000"
      WORKER_POLL_INTERVAL_SECONDS: "5"
      WORKER_RATE_LIMIT_FALLBACK_SECONDS: "60"
      WORKER_STALE_JOB_TIMEOUT_SECONDS: "300"
      WORKER_ID: worker-compose
    command: github-data-sync-worker
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
